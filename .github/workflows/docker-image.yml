name: Docker Image CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0'   # weekly: AROS source moves; rebuild to pick up changes

jobs:
  push_to_registry:
    name: Build and push AROS cross-compiler images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        aros_target: [i386-aros, x86_64-aros]

    steps:
      - name: Free up disk space
        # AROS toolchain build needs ~10 GB; ubuntu-latest ships ~14 GB free
        # but a few GB are taken by preinstalled tooling we don't use here.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"

      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          build-args: aros_target=${{ matrix.aros_target }}
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: midwan/aros-compiler:${{ matrix.aros_target }}
          cache-from: type=gha,scope=${{ matrix.aros_target }}
          cache-to: type=gha,scope=${{ matrix.aros_target }},mode=max
